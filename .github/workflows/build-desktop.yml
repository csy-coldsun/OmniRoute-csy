name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: cd electron && npm install && npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: electron/dist-electron/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: cd electron && npm install && npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: electron/dist-electron/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: cd electron && npm install && npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: electron/dist-electron/*
